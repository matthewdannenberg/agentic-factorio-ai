[pytest]
# Unit and integration tests (no Factorio required):
#   pytest tests/
#
# In-game tests (Factorio must be running with RCON enabled):
#   pytest tests_in_game/
#
# All tests:
#   pytest tests/ tests_in_game/
#
# The two directories are kept separate so CI can run unit tests without a
# game instance. In-game tests skip automatically if RCON is unreachable.

testpaths = tests

# Show short tracebacks for in-game failures (they tend to be integration
# failures with long stack traces that obscure the actual assertion).
addopts = --tb=short
